<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wallpaper — elektroedde</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .label {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      color: rgba(253, 216, 53, 0.35);
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>
  <div class="label">ELEKTROEDDE</div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let W, H, t = 0;

    function resize() {
      W = canvas.width  = window.innerWidth  * devicePixelRatio;
      H = canvas.height = window.innerHeight * devicePixelRatio;
      canvas.style.width  = window.innerWidth  + 'px';
      canvas.style.height = window.innerHeight + 'px';
    }

    window.addEventListener('resize', resize);
    resize();

    // --- Palette: JET (matches .testinn animated gradient)
    const COLORS = [
      [0,   0, 127],   // #00007F dark blue
      [0,   0, 255],   // #0000FF blue
      [0,  255, 255],  // #00FFFF cyan
      [127,255, 127],  // #7FFF7F green
      [255,255,   0],  // #FFFF00 yellow
      [255,  0,   0],  // #FF0000 red
    ];

    function lerpColor(a, b, t) {
      return [
        a[0] + (b[0] - a[0]) * t,
        a[1] + (b[1] - a[1]) * t,
        a[2] + (b[2] - a[2]) * t,
      ];
    }

    function paletteColor(v) {
      // v in [0,1] — maps through COLORS
      v = Math.max(0, Math.min(0.9999, v));
      const idx = v * (COLORS.length - 1);
      const lo  = Math.floor(idx);
      const hi  = lo + 1;
      const f   = idx - lo;
      return lerpColor(COLORS[lo], COLORS[hi], f);
    }

    // --- Wave field parameters
    const WAVES = Array.from({ length: 7 }, (_, i) => ({
      kx:    0.003 + Math.random() * 0.007,
      ky:    0.002 + Math.random() * 0.006,
      omega: 0.4   + Math.random() * 0.8,
      phase: Math.random() * Math.PI * 2,
      amp:   0.8   + Math.random() * 0.5,
    }));

    // --- Spiral arms (galaxy / EM field lines)
    const SPIRALS = Array.from({ length: 5 }, (_, i) => ({
      phase:  (i / 5) * Math.PI * 2,
      arms:   2 + i,
      tight:  0.18 + i * 0.04,
      speed:  0.12 + i * 0.07,
      alpha:  0.04 + i * 0.01,
      hue:    i / 5,
    }));

    // --- Off-screen pixel buffer for wave field
    let offscreen, offCtx;

    function ensureOffscreen() {
      if (!offscreen || offscreen.width !== W || offscreen.height !== H) {
        offscreen = document.createElement('canvas');
        offscreen.width  = W;
        offscreen.height = H;
        offCtx = offscreen.getContext('2d');
      }
    }

    // Resolution divisor — we render at lower res then upscale for perf
    const SCALE = 4;

    function drawWaveField(time) {
      ensureOffscreen();

      const sw = Math.ceil(W / SCALE);
      const sh = Math.ceil(H / SCALE);

      const imgData = offCtx.createImageData(sw, sh);
      const data    = imgData.data;

      for (let py = 0; py < sh; py++) {
        for (let px = 0; px < sw; px++) {
          const x = (px / sw) * W;
          const y = (py / sh) * H;

          // Superposition of traveling sine waves
          let val = 0;
          for (const w of WAVES) {
            val += w.amp * Math.sin(w.kx * x + w.ky * y - w.omega * time + w.phase);
          }

          // Normalize to [0,1]
          const norm = (val / (WAVES.length * 1.3) + 1) * 0.5;

          // Distance vignette
          const cx = x - W * 0.5, cy = y - H * 0.5;
          const dist = Math.sqrt(cx * cx + cy * cy);
          const maxDist = Math.sqrt(W * W + H * H) * 0.5;
          const vig = 1 - Math.pow(dist / maxDist, 2.8);

          // Stretch the curve so peaks push into yellow/red territory
          const bright = Math.min(1, Math.pow(norm, 0.6) * vig * 1.3);

          const [r, g, b] = paletteColor(bright);

          const idx = (py * sw + px) * 4;
          data[idx]     = r;
          data[idx + 1] = g;
          data[idx + 2] = b;
          data[idx + 3] = 255;
        }
      }

      offCtx.putImageData(imgData, 0, 0);

      // Upscale back to full canvas
      ctx.drawImage(offscreen, 0, 0, sw, sh, 0, 0, W, H);
    }

    function drawSpirals(time) {
      for (const sp of SPIRALS) {
        const steps = 2800;
        const [r, g, b] = paletteColor(sp.hue * 0.9);

        ctx.beginPath();
        let first = true;
        for (let i = 0; i < steps; i++) {
          const theta = (i / steps) * Math.PI * 16 + sp.phase + time * sp.speed;
          for (let arm = 0; arm < sp.arms; arm++) {
            const at = theta + (arm / sp.arms) * Math.PI * 2;
            const r2 = sp.tight * at;
            const cx  = W * 0.5 + r2 * Math.cos(at) * (W * 0.065);
            const cy  = H * 0.5 + r2 * Math.sin(at) * (H * 0.065);

            if (cx < -W * 0.1 || cx > W * 1.1 || cy < -H * 0.1 || cy > H * 1.1) {
              first = true; continue;
            }

            if (first) { ctx.moveTo(cx, cy); first = false; }
            else        { ctx.lineTo(cx, cy); }
          }
        }

        ctx.strokeStyle = `rgba(${r},${g},${b},${sp.alpha})`;
        ctx.lineWidth   = 1.5 / devicePixelRatio;
        ctx.stroke();
        ctx.beginPath();
      }
    }

    function drawGlow(time) {
      // Pulsing central glow
      const pulse = 0.55 + 0.45 * Math.sin(time * 0.7);
      const cx = W * 0.5, cy = H * 0.5;
      const radius = Math.min(W, H) * 0.45 * pulse;

      const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
      grd.addColorStop(0,   `rgba(253,216,53,${0.07 * pulse})`);
      grd.addColorStop(0.3, `rgba(0,180,220,${0.04 * pulse})`);
      grd.addColorStop(1,   'rgba(0,0,0,0)');

      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, W, H);
    }

    function draw(ts) {
      t = ts * 0.001;

      drawWaveField(t);
      drawSpirals(t);
      drawGlow(t);

      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
  </script>
</body>

</html>
